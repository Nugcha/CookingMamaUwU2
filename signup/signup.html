<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cooking Mama Restaurant</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./signup.css"/>
</head>
<body>

  <div id="authLoader"><div class="big-spinner"></div></div>

  <div class="stars-layer" id="starsLayer" aria-hidden="true"></div>
  <div class="side-panel left"></div>
  <div class="side-panel right"></div>

  <main class="page-wrapper">
    <div class="card">

      <div class="kitchen-banner">
        <img class="bg" src="../assets/cookingbg.png" alt="Cooking Mama Kitchen"/>
        <img class="logo-wrap" src="../assets/logoyes.png" alt="Cooking Mama Logo"/>

        <div class="theme-pill" id="themePill" title="Toggle dark mode">
          <div class="toggle-track"><div class="toggle-thumb"></div></div>
          <span id="themeIcon">Dark</span>
        </div>
      </div>

      <div class="card-body">
        <div id="loadingState"><div class="spinner" style="border-top-color:#EC407A;border-color:rgba(236,64,122,0.2)"></div></div>

        <!-- Signed OUT -->
        <div id="signedOutState" style="display:none; flex-direction:column; align-items:center; gap:14px; width:100%;">
          <p class="tagline">Welcome to Mama's Kitchen</p>
          <button class="btn-google" id="btnGoogle">
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path fill="#fff" d="M44.5 20H24v8.5h11.7C34.2 33.6 29.6 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.1-6.1C34.8 5.5 29.7 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.8 0 20.3-7.8 20.3-21 0-1.4-.1-2.7-.3-4z"/>
            </svg>
            Sign in with Google
          </button>
        </div>

        <!-- Signed IN -->
        <div id="signedInState" style="display:none; flex-direction:column; align-items:center; gap:12px; width:100%;">
          <div class="user-pill">
            <img id="userAvatar" src="" alt="avatar"/>
            <span id="userName">Guest</span>
          </div>
          <p class="welcome-text" id="welcomeMsg">Let's get cooking!</p>
          <button class="enter-btn" id="enterBtn">Enter the Restaurant</button>
          <button class="sign-out-btn" id="btnSignOut">Sign Out</button>
        </div>
      </div>

    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script type="module" src="./signup.js"></script>
</body>
</html>
